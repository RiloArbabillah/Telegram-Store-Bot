{% extends 'admin/base.html' %}{% block title %}Pengaturan{% endblock %}{% block content %}<div class="page-heading"><div><h1>Pengaturan toko</h1><p>Konten utama yang digunakan bot.</p></div></div><form class="form-layout wide" method="post" enctype="multipart/form-data"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><label>Pesan sambutan<textarea name="welcome_message" rows="5">{{ store.welcome_message or '' }}</textarea></label><div class="form-row"><label>Username support<input name="support_username" value="{{ store.support_username or '' }}" placeholder="boleh pakai @"><span class="helper">Akan disimpan tanpa @, sama seperti bot.</span></label><label>Username channel<input name="channel_username" value="{{ store.channel_username or '' }}" placeholder="boleh pakai @"><span class="helper">Akan disimpan tanpa @, sama seperti bot.</span></label></div><div class="form-row"><label>Logo toko<input type="file" name="store_logo" accept="image/png,image/jpeg,image/webp"><span class="helper">PNG, JPG, atau WebP. Maksimal 5 MB.</span></label><label>Gambar QRIS<input type="file" name="qris_image" accept="image/png,image/jpeg,image/webp"><span class="helper">Harus gambar QRIS statis yang bisa dibaca; payload akan diambil otomatis.</span></label></div><label>Instruksi QRIS<textarea name="qris_instructions_text">{{ store.qris_instructions_text or '' }}</textarea></label><label>Static payload QRIS<textarea name="qris_static_payload">{{ store.qris_static_payload or '' }}</textarea><span class="helper">Terisi otomatis saat upload gambar QRIS valid; bisa diisi manual jika perlu.</span></label><div class="form-actions"><button class="button primary" type="submit">Simpan pengaturan</button></div></form>{% endblock %}
