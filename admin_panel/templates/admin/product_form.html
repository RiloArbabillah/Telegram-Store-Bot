{% extends 'admin/base.html' %}{% block title %}{{ 'Edit' if product else 'Tambah' }} Produk{% endblock %}{% block content %}
<div class="page-heading"><div><h1>{{ 'Edit produk' if product else 'Tambah produk' }}</h1><p>Atur informasi produk yang tampil di bot.</p></div></div>
<form class="form-layout" method="post" enctype="multipart/form-data"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><label>Nama produk<input name="name" required value="{{ product.name if product else request.form.get('name','') }}"></label><label>Deskripsi<textarea name="description">{{ product.description if product and product.description else request.form.get('description','') }}</textarea></label><div class="form-row"><label>Harga<input type="number" min="1" name="price" required value="{{ product.price if product else request.form.get('price','') }}"></label><label>Tipe<select name="product_type" required>{% for type in product_types %}<option value="{{ type.value }}" {{ 'selected' if product and product.product_type == type else '' }}>{{ type.value|upper }}</option>{% endfor %}</select></label></div><div class="form-row"><label>Kategori<select name="category_id"><option value="">Tanpa kategori</option>{% for item in categories %}<option value="{{ item.id }}" {{ 'selected' if product and product.category_id == item.id else '' }}>{{ item.name }}</option>{% endfor %}</select></label><label>Subkategori<select name="subcategory_id"><option value="">Tanpa subkategori</option>{% for item in subcategories %}<option value="{{ item.id }}" {{ 'selected' if product and product.subcategory_id == item.id else '' }}>{{ item.name }}</option>{% endfor %}</select></label></div><label>Gambar produk<input type="file" name="image" accept="image/png,image/jpeg,image/webp"><span class="helper">PNG, JPG, atau WebP. Maksimal 5 MB.</span></label><label>Link unduhan<input type="url" name="download_link" value="{{ product.download_link if product and product.download_link else '' }}"></label><label class="checkbox"><input type="checkbox" name="is_active" value="1" {{ 'checked' if not product or product.is_active else '' }}> Produk aktif</label><div class="form-actions"><a class="button ghost" href="{{ url_for('admin_panel.products') }}">Batal</a><button class="button primary" type="submit">Simpan produk</button></div></form>
{% endblock %}
